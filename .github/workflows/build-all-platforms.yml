# CI/CD workflow for ICD360S e.V. Mitgliederportal
# 4 jobs: Linux, Android, Apple, Windows
# Smart cache: skips platforms unchanged since last successful build
name: Build All Platforms

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.4'
  JAVA_VERSION: '17'

jobs:
  # ============================================
  # DETECT: compare file hashes with last successful build
  # ============================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      linux: ${{ steps.flags.outputs.linux }}
      android: ${{ steps.flags.outputs.android }}
      apple: ${{ steps.flags.outputs.apple }}
      windows: ${{ steps.flags.outputs.windows }}
      linux_hash: ${{ steps.check.outputs.linux_hash }}
      android_hash: ${{ steps.check.outputs.android_hash }}
      apple_hash: ${{ steps.check.outputs.apple_hash }}
      win_hash: ${{ steps.check.outputs.win_hash }}
    steps:
      - uses: actions/checkout@v5

      - name: Compute hashes
        id: check
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "linux=true" >> $GITHUB_OUTPUT
            echo "android=true" >> $GITHUB_OUTPUT
            echo "apple=true" >> $GITHUB_OUTPUT
            echo "windows=true" >> $GITHUB_OUTPUT
            echo "linux_hash=force" >> $GITHUB_OUTPUT
            echo "android_hash=force" >> $GITHUB_OUTPUT
            echo "apple_hash=force" >> $GITHUB_OUTPUT
            echo "win_hash=force" >> $GITHUB_OUTPUT
            echo "BUILD ALL: tag or manual trigger"
            exit 0
          fi

          SHARED=$(find lib/ pubspec.yaml l10n.yaml -type f 2>/dev/null | sort | xargs sha256sum 2>/dev/null | sha256sum | cut -d' ' -f1)

          LINUX_H=$(echo "$SHARED"; find linux/ -type f 2>/dev/null | sort | xargs sha256sum 2>/dev/null) && LINUX_H=$(echo "$LINUX_H" | sha256sum | cut -d' ' -f1)
          ANDROID_H=$(echo "$SHARED"; find android/ -type f 2>/dev/null | sort | xargs sha256sum 2>/dev/null) && ANDROID_H=$(echo "$ANDROID_H" | sha256sum | cut -d' ' -f1)
          APPLE_H=$(echo "$SHARED"; find ios/ macos/ -type f 2>/dev/null | sort | xargs sha256sum 2>/dev/null) && APPLE_H=$(echo "$APPLE_H" | sha256sum | cut -d' ' -f1)
          WIN_H=$(echo "$SHARED"; find windows/ -type f 2>/dev/null | sort | xargs sha256sum 2>/dev/null) && WIN_H=$(echo "$WIN_H" | sha256sum | cut -d' ' -f1)

          echo "Hashes: LINUX=$LINUX_H ANDROID=$ANDROID_H APPLE=$APPLE_H WIN=$WIN_H"
          echo "linux_hash=$LINUX_H" >> $GITHUB_OUTPUT
          echo "android_hash=$ANDROID_H" >> $GITHUB_OUTPUT
          echo "apple_hash=$APPLE_H" >> $GITHUB_OUTPUT
          echo "win_hash=$WIN_H" >> $GITHUB_OUTPUT

          # Dummy files for cache lookup
          echo "$LINUX_H" > /tmp/linux-h.txt
          echo "$ANDROID_H" > /tmp/android-h.txt
          echo "$APPLE_H" > /tmp/apple-h.txt
          echo "$WIN_H" > /tmp/win-h.txt

      - name: Check Linux cache
        id: cache-linux
        uses: actions/cache/restore@v5
        with:
          path: /tmp/linux-h.txt
          key: v3-build-ok-linux-${{ steps.check.outputs.linux_hash }}
          lookup-only: true

      - name: Check Android cache
        id: cache-android
        uses: actions/cache/restore@v5
        with:
          path: /tmp/android-h.txt
          key: v3-build-ok-android-${{ steps.check.outputs.android_hash }}
          lookup-only: true

      - name: Check Apple cache
        id: cache-apple
        uses: actions/cache/restore@v5
        with:
          path: /tmp/apple-h.txt
          key: v3-build-ok-apple-${{ steps.check.outputs.apple_hash }}
          lookup-only: true

      - name: Check Windows cache
        id: cache-win
        uses: actions/cache/restore@v5
        with:
          path: /tmp/win-h.txt
          key: v3-build-ok-windows-${{ steps.check.outputs.win_hash }}
          lookup-only: true

      - name: Set build flags
        id: flags
        run: |
          for platform in linux android apple windows; do
            CACHE_VAR="cache-${platform}"
            if [ "$platform" = "windows" ]; then CACHE_VAR="cache-win"; fi

            HIT="${{ steps.cache-linux.outputs.cache-hit }}"
            case "$platform" in
              android) HIT="${{ steps.cache-android.outputs.cache-hit }}" ;;
              apple) HIT="${{ steps.cache-apple.outputs.cache-hit }}" ;;
              windows) HIT="${{ steps.cache-win.outputs.cache-hit }}" ;;
            esac

            if [ "$HIT" == "true" ]; then
              echo "→ $platform: SKIP (already built)"
              echo "$platform=false" >> $GITHUB_OUTPUT
            else
              echo "→ $platform: BUILD"
              echo "$platform=true" >> $GITHUB_OUTPUT
            fi
          done

  # ============================================
  # LINUX desktop + packages
  # ============================================
  build-linux:
    name: Linux
    needs: detect-changes
    if: needs.detect-changes.outputs.linux == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev libnotify-dev \
            libayatana-appindicator3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v7
        with:
          name: icd360sev-linux
          path: build/linux/x64/release/bundle/
          if-no-files-found: error

      # --- Linux Packages ---
      - name: Install packaging tools
        run: |
          sudo apt-get install -y ruby-dev rpm libfuse2
          sudo gem install fpm
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Create .deb
        run: |
          BUNDLE=build/linux/x64/release/bundle
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          mkdir -p /tmp/scripts
          printf '#!/bin/sh\nln -sf /opt/icd360sev-mitglied/icd360sev_mitglied /usr/local/bin/icd360sev_mitglied\n' > /tmp/scripts/postinst
          chmod +x /tmp/scripts/postinst
          fpm -s dir -t deb --name icd360sev-mitglied --version "$VERSION" \
            --description "ICD360S e.V. Mitglieder-App" --maintainer "ICD360S e.V." \
            --url "https://icd360s.de" --license "Proprietary" --architecture amd64 \
            --depends libgtk-3-0 --depends libsecret-1-0 --depends libjsoncpp25 --depends libnotify4 \
            --after-install /tmp/scripts/postinst \
            "$BUNDLE/=/opt/icd360sev-mitglied/" \
            "linux/icd360sev_mitglied.desktop=/usr/share/applications/icd360sev_mitglied.desktop"
          mv icd360sev-mitglied_*.deb icd360sev-mitglied.deb

      - name: Upload .deb
        uses: actions/upload-artifact@v7
        with:
          name: icd360sev-linux-deb
          path: icd360sev-mitglied.deb
          if-no-files-found: error

      - name: Create .rpm
        run: |
          BUNDLE=build/linux/x64/release/bundle
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          fpm -s dir -t rpm --name icd360sev-mitglied --version "$VERSION" \
            --description "ICD360S e.V. Mitglieder-App" --maintainer "ICD360S e.V." \
            --url "https://icd360s.de" --license "Proprietary" --architecture x86_64 \
            --depends gtk3 --depends libsecret --depends jsoncpp --depends libnotify \
            --after-install /tmp/scripts/postinst \
            "$BUNDLE/=/opt/icd360sev-mitglied/" \
            "linux/icd360sev_mitglied.desktop=/usr/share/applications/icd360sev_mitglied.desktop"
          mv icd360sev-mitglied-*.rpm icd360sev-mitglied.rpm

      - name: Upload .rpm
        uses: actions/upload-artifact@v7
        with:
          name: icd360sev-linux-rpm
          path: icd360sev-mitglied.rpm
          if-no-files-found: error

      - name: Create AppImage
        run: |
          BUNDLE=build/linux/x64/release/bundle
          mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/applications
          cp -r "$BUNDLE"/* AppDir/usr/bin/
          [ -d "AppDir/usr/bin/lib" ] && mv AppDir/usr/bin/lib/* AppDir/usr/lib/ && rmdir AppDir/usr/bin/lib
          cp linux/icd360sev_mitglied.desktop AppDir/
          cp linux/icd360sev_mitglied.desktop AppDir/usr/share/applications/
          printf '#!/bin/bash\nSELF=$(readlink -f "$0")\nHERE=${SELF%%/*}\nexport LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"\nexec "${HERE}/usr/bin/icd360sev_mitglied" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > AppDir/icd360sev_mitglied.png
          ARCH=x86_64 appimagetool --no-appstream AppDir icd360sev-mitglied.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: icd360sev-linux-appimage
          path: icd360sev-mitglied.AppImage
          if-no-files-found: error

      - name: Save cache marker
        run: echo "ok" > /tmp/linux-ok.txt
      - uses: actions/cache/save@v5
        with:
          path: /tmp/linux-ok.txt
          key: v3-build-ok-linux-${{ needs.detect-changes.outputs.linux_hash }}

  # ============================================
  # ANDROID - each flavor in its own matrix job (separate memory)
  # ============================================
  build-android:
    name: Android (${{ matrix.flavor }})
    needs: detect-changes
    if: needs.detect-changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: universal
            build_cmd: "flutter build apk --release --obfuscate --split-debug-info=build/symbols --split-per-abi"
            apk_path: "build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
            artifact_name: icd360sev-universal-apk
          - flavor: fdroid
            build_cmd: "flutter build apk --release --flavor fdroid --obfuscate --split-debug-info=build/symbols --split-per-abi"
            apk_path: "build/app/outputs/flutter-apk/app-arm64-v8a-fdroid-release.apk"
            artifact_name: icd360sev-fdroid-apk
          - flavor: googleplay
            build_cmd: "flutter build apk --release --flavor googleplay --obfuscate --split-debug-info=build/symbols --split-per-abi"
            apk_path: "build/app/outputs/flutter-apk/app-arm64-v8a-googleplay-release.apk"
            artifact_name: icd360sev-googleplay-apk
          - flavor: amazon
            build_cmd: "flutter build apk --release --flavor amazon --obfuscate --split-debug-info=build/symbols --split-per-abi"
            apk_path: "build/app/outputs/flutter-apk/app-arm64-v8a-amazon-release.apk"
            artifact_name: icd360sev-amazon-apk
          - flavor: huawei
            build_cmd: "flutter build apk --release --flavor huawei --obfuscate --split-debug-info=build/symbols --split-per-abi"
            apk_path: "build/app/outputs/flutter-apk/app-arm64-v8a-huawei-release.apk"
            artifact_name: icd360sev-huawei-apk
          - flavor: samsung
            build_cmd: "flutter build apk --release --flavor samsung --obfuscate --split-debug-info=build/symbols --split-per-abi"
            apk_path: "build/app/outputs/flutter-apk/app-arm64-v8a-samsung-release.apk"
            artifact_name: icd360sev-samsung-apk
    steps:
      - uses: actions/checkout@v5

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build APK (${{ matrix.flavor }})
        run: ${{ matrix.build_cmd }}

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.apk_path }}
          if-no-files-found: error

      # Google Play AAB (only for googleplay flavor)
      - name: Build AAB (Google Play)
        if: matrix.flavor == 'googleplay'
        run: |
          flutter build appbundle --release --flavor googleplay \
            --obfuscate --split-debug-info=build/symbols-aab

      - name: Upload AAB
        if: matrix.flavor == 'googleplay'
        uses: actions/upload-artifact@v7
        with:
          name: icd360sev-googleplay-aab
          path: build/app/outputs/bundle/googleplayRelease/app-googleplay-release.aab
          if-no-files-found: error

      - name: Upload debug symbols
        uses: actions/upload-artifact@v7
        with:
          name: symbols-android-${{ matrix.flavor }}
          path: build/symbols/

  # Save Android cache marker (runs after all matrix jobs)
  save-android-cache:
    name: Save Android Cache
    needs: [detect-changes, build-android]
    runs-on: ubuntu-latest
    steps:
      - run: echo "ok" > /tmp/android-ok.txt
      - uses: actions/cache/save@v5
        with:
          path: /tmp/android-ok.txt
          key: v3-build-ok-android-${{ needs.detect-changes.outputs.android_hash }}

  # ============================================
  # APPLE (iOS + macOS) - 1 runner
  # ============================================
  build-apple:
    name: Apple (iOS + macOS)
    needs: detect-changes
    if: needs.detect-changes.outputs.apple == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Flutter
        run: |
          git clone --depth 1 --branch ${{ env.FLUTTER_VERSION }} https://github.com/flutter/flutter.git "$HOME/flutter"
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build
        uses: actions/upload-artifact@v7
        with:
          name: icd360sev-ios
          path: build/ios/iphoneos/Runner.app
          if-no-files-found: error

      - name: Disable macOS code signing for CI
        run: |
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = ""/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "Mac Development"/CODE_SIGN_IDENTITY = ""/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = B42ZX94AKL/DEVELOPMENT_TEAM = ""/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' macos/Runner.xcodeproj/project.pbxproj

      - name: Build macOS
        run: flutter build macos --release

      - name: Upload macOS build
        uses: actions/upload-artifact@v7
        with:
          name: icd360sev-macos
          path: build/macos/Build/Products/Release/icd360sev_mitglied.app
          if-no-files-found: error

      - name: Save cache marker
        run: echo "ok" > /tmp/apple-ok.txt
      - uses: actions/cache/save@v5
        with:
          path: /tmp/apple-ok.txt
          key: v3-build-ok-apple-${{ needs.detect-changes.outputs.apple_hash }}

  # ============================================
  # WINDOWS - 1 runner
  # ============================================
  build-windows:
    name: Windows
    needs: detect-changes
    if: needs.detect-changes.outputs.windows == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows build
        uses: actions/upload-artifact@v7
        with:
          name: icd360sev-windows
          path: build/windows/x64/runner/Release/
          if-no-files-found: error

      - name: Save cache marker
        shell: bash
        run: echo "ok" > "$RUNNER_TEMP/win-ok.txt"
      - uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/win-ok.txt
          key: v3-build-ok-windows-${{ needs.detect-changes.outputs.win_hash }}

  # ============================================
  # Release (only on version tags)
  # ============================================
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-android, save-android-cache, build-apple, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release/

          # Android APKs + AAB
          cp artifacts/icd360sev-universal-apk/*.apk release/icd360sev-universal.apk
          cp artifacts/icd360sev-fdroid-apk/*.apk release/icd360sev-fdroid.apk
          cp artifacts/icd360sev-googleplay-apk/*.apk release/icd360sev-googleplay.apk
          cp artifacts/icd360sev-googleplay-aab/*.aab release/icd360sev-googleplay.aab
          cp artifacts/icd360sev-amazon-apk/*.apk release/icd360sev-amazon.apk
          cp artifacts/icd360sev-huawei-apk/*.apk release/icd360sev-huawei.apk
          cp artifacts/icd360sev-samsung-apk/*.apk release/icd360sev-samsung.apk

          # Desktop & iOS
          cd artifacts/icd360sev-windows && zip -r ../../release/icd360sev-windows.zip . && cd ../..
          cd artifacts/icd360sev-linux && tar czf ../../release/icd360sev-linux.tar.gz . && cd ../..
          cd artifacts/icd360sev-macos && zip -r ../../release/icd360sev-macos.zip . && cd ../..
          cd artifacts/icd360sev-ios && zip -r ../../release/icd360sev-ios.zip . && cd ../..

          # Linux packages
          cp artifacts/icd360sev-linux-deb/*.deb release/icd360sev-mitglied.deb
          cp artifacts/icd360sev-linux-rpm/*.rpm release/icd360sev-mitglied.rpm
          cp artifacts/icd360sev-linux-appimage/*.AppImage release/icd360sev-mitglied.AppImage

          echo "Release files:"
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
