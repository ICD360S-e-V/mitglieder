# CI/CD workflow for ICD360S e.V. Mitgliederportal
# 4 jobs: Linux, Android, Apple, Windows
# Smart cache: skips platforms unchanged since last successful build
name: Build All Platforms

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.6'
  JAVA_VERSION: '17'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================
  # DETECT: compare file hashes with last successful build
  # ============================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      linux: ${{ steps.flags.outputs.linux }}
      android: ${{ steps.flags.outputs.android }}
      apple: ${{ steps.flags.outputs.apple }}
      windows: ${{ steps.flags.outputs.windows }}
      linux_hash: ${{ steps.check.outputs.linux_hash }}
      android_hash: ${{ steps.check.outputs.android_hash }}
      apple_hash: ${{ steps.check.outputs.apple_hash }}
      win_hash: ${{ steps.check.outputs.win_hash }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Compute hashes
        id: check
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "linux=true" >> $GITHUB_OUTPUT
            echo "android=true" >> $GITHUB_OUTPUT
            echo "apple=true" >> $GITHUB_OUTPUT
            echo "windows=true" >> $GITHUB_OUTPUT
            echo "linux_hash=force" >> $GITHUB_OUTPUT
            echo "android_hash=force" >> $GITHUB_OUTPUT
            echo "apple_hash=force" >> $GITHUB_OUTPUT
            echo "win_hash=force" >> $GITHUB_OUTPUT
            echo "BUILD ALL: tag or manual trigger"
            exit 0
          fi

          SHARED=$(find lib/ pubspec.yaml l10n.yaml -type f 2>/dev/null | sort | xargs sha256sum 2>/dev/null | sha256sum | cut -d' ' -f1)

          LINUX_H=$(echo "$SHARED"; find linux/ -type f 2>/dev/null | sort | xargs sha256sum 2>/dev/null) && LINUX_H=$(echo "$LINUX_H" | sha256sum | cut -d' ' -f1)
          ANDROID_H=$(echo "$SHARED"; find android/ -type f 2>/dev/null | sort | xargs sha256sum 2>/dev/null) && ANDROID_H=$(echo "$ANDROID_H" | sha256sum | cut -d' ' -f1)
          APPLE_H=$(echo "$SHARED"; find ios/ macos/ -type f 2>/dev/null | sort | xargs sha256sum 2>/dev/null) && APPLE_H=$(echo "$APPLE_H" | sha256sum | cut -d' ' -f1)
          WIN_H=$(echo "$SHARED"; find windows/ -type f 2>/dev/null | sort | xargs sha256sum 2>/dev/null) && WIN_H=$(echo "$WIN_H" | sha256sum | cut -d' ' -f1)

          echo "Hashes: LINUX=$LINUX_H ANDROID=$ANDROID_H APPLE=$APPLE_H WIN=$WIN_H"
          echo "linux_hash=$LINUX_H" >> $GITHUB_OUTPUT
          echo "android_hash=$ANDROID_H" >> $GITHUB_OUTPUT
          echo "apple_hash=$APPLE_H" >> $GITHUB_OUTPUT
          echo "win_hash=$WIN_H" >> $GITHUB_OUTPUT

          # Dummy files for cache lookup
          echo "$LINUX_H" > /tmp/linux-h.txt
          echo "$ANDROID_H" > /tmp/android-h.txt
          echo "$APPLE_H" > /tmp/apple-h.txt
          echo "$WIN_H" > /tmp/win-h.txt

      - name: Check Linux cache
        id: cache-linux
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: /tmp/linux-h.txt
          key: v3-build-ok-linux-${{ steps.check.outputs.linux_hash }}
          lookup-only: true

      - name: Check Android cache
        id: cache-android
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: /tmp/android-h.txt
          key: v3-build-ok-android-${{ steps.check.outputs.android_hash }}
          lookup-only: true

      - name: Check Apple cache
        id: cache-apple
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: /tmp/apple-h.txt
          key: v3-build-ok-apple-${{ steps.check.outputs.apple_hash }}
          lookup-only: true

      - name: Check Windows cache
        id: cache-win
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: /tmp/win-h.txt
          key: v3-build-ok-windows-${{ steps.check.outputs.win_hash }}
          lookup-only: true

      - name: Set build flags
        id: flags
        run: |
          for platform in linux android apple windows; do
            CACHE_VAR="cache-${platform}"
            if [ "$platform" = "windows" ]; then CACHE_VAR="cache-win"; fi

            HIT="${{ steps.cache-linux.outputs.cache-hit }}"
            case "$platform" in
              android) HIT="${{ steps.cache-android.outputs.cache-hit }}" ;;
              apple) HIT="${{ steps.cache-apple.outputs.cache-hit }}" ;;
              windows) HIT="${{ steps.cache-win.outputs.cache-hit }}" ;;
            esac

            if [ "$HIT" == "true" ]; then
              echo "→ $platform: SKIP (already built)"
              echo "$platform=false" >> $GITHUB_OUTPUT
            else
              echo "→ $platform: BUILD"
              echo "$platform=true" >> $GITHUB_OUTPUT
            fi
          done

  # ============================================
  # LINUX desktop + packages
  # ============================================
  build-linux:
    name: Linux
    needs: detect-changes
    if: needs.detect-changes.outputs.linux == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev libnotify-dev \
            libayatana-appindicator3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: icd360sev-linux
          path: build/linux/x64/release/bundle/
          if-no-files-found: error

      # --- Linux Packages ---
      - name: Install packaging tools
        run: |
          sudo apt-get install -y ruby-dev rpm libfuse2
          sudo gem install fpm
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Create .deb
        run: |
          BUNDLE=build/linux/x64/release/bundle
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          mkdir -p /tmp/scripts
          printf '#!/bin/sh\nln -sf /opt/icd360sev-mitglied/icd360sev_mitglied /usr/local/bin/icd360sev_mitglied\n' > /tmp/scripts/postinst
          chmod +x /tmp/scripts/postinst
          fpm -s dir -t deb --name icd360sev-mitglied --version "$VERSION" \
            --description "ICD360S e.V. Mitglieder-App" --maintainer "ICD360S e.V." \
            --url "https://icd360s.de" --license "Proprietary" --architecture amd64 \
            --depends libgtk-3-0 --depends libsecret-1-0 --depends libjsoncpp25 --depends libnotify4 \
            --after-install /tmp/scripts/postinst \
            "$BUNDLE/=/opt/icd360sev-mitglied/" \
            "linux/icd360sev_mitglied.desktop=/usr/share/applications/icd360sev_mitglied.desktop"
          mv icd360sev-mitglied_*.deb icd360sev-mitglied.deb

      - name: Upload .deb
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: icd360sev-linux-deb
          path: icd360sev-mitglied.deb
          if-no-files-found: error

      - name: Create .rpm
        run: |
          BUNDLE=build/linux/x64/release/bundle
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          fpm -s dir -t rpm --name icd360sev-mitglied --version "$VERSION" \
            --description "ICD360S e.V. Mitglieder-App" --maintainer "ICD360S e.V." \
            --url "https://icd360s.de" --license "Proprietary" --architecture x86_64 \
            --depends gtk3 --depends libsecret --depends jsoncpp --depends libnotify \
            --after-install /tmp/scripts/postinst \
            "$BUNDLE/=/opt/icd360sev-mitglied/" \
            "linux/icd360sev_mitglied.desktop=/usr/share/applications/icd360sev_mitglied.desktop"
          mv icd360sev-mitglied-*.rpm icd360sev-mitglied.rpm

      - name: Upload .rpm
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: icd360sev-linux-rpm
          path: icd360sev-mitglied.rpm
          if-no-files-found: error

      - name: Create AppImage
        run: |
          BUNDLE=build/linux/x64/release/bundle
          mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/applications
          cp -r "$BUNDLE"/* AppDir/usr/bin/
          [ -d "AppDir/usr/bin/lib" ] && mv AppDir/usr/bin/lib/* AppDir/usr/lib/ && rmdir AppDir/usr/bin/lib
          cp linux/icd360sev_mitglied.desktop AppDir/
          cp linux/icd360sev_mitglied.desktop AppDir/usr/share/applications/
          printf '#!/bin/bash\nSELF=$(readlink -f "$0")\nHERE=${SELF%%/*}\nexport LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"\nexec "${HERE}/usr/bin/icd360sev_mitglied" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > AppDir/icd360sev_mitglied.png
          ARCH=x86_64 appimagetool --no-appstream AppDir icd360sev-mitglied.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: icd360sev-linux-appimage
          path: icd360sev-mitglied.AppImage
          if-no-files-found: error

      - name: Save cache marker
        run: echo "ok" > /tmp/linux-ok.txt
      - uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: /tmp/linux-ok.txt
          key: v3-build-ok-linux-${{ needs.detect-changes.outputs.linux_hash }}

  # ============================================
  # ANDROID - each flavor in its own matrix job (separate memory)
  # ============================================
  build-android:
    name: Android (${{ matrix.flavor }})
    needs: detect-changes
    if: needs.detect-changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: universal
            build_cmd: "flutter build apk --release --flavor fdroid --obfuscate --split-debug-info=build/symbols"
            apk_path: "build/app/outputs/flutter-apk/app-fdroid-release.apk"
            artifact_name: icd360sev-universal-apk
          - flavor: fdroid
            build_cmd: "flutter build apk --release --flavor fdroid --obfuscate --split-debug-info=build/symbols --split-per-abi"
            apk_path: "build/app/outputs/flutter-apk/app-arm64-v8a-fdroid-release.apk"
            artifact_name: icd360sev-fdroid-apk
          - flavor: googleplay
            build_cmd: "flutter build apk --release --flavor googleplay --obfuscate --split-debug-info=build/symbols --split-per-abi"
            apk_path: "build/app/outputs/flutter-apk/app-arm64-v8a-googleplay-release.apk"
            artifact_name: icd360sev-googleplay-apk
          - flavor: googleplay-aab
            build_cmd: "flutter build appbundle --release --flavor googleplay --obfuscate --split-debug-info=build/symbols"
            apk_path: "build/app/outputs/bundle/googleplayRelease/app-googleplay-release.aab"
            artifact_name: icd360sev-googleplay-aab
          - flavor: amazon
            build_cmd: "flutter build apk --release --flavor amazon --obfuscate --split-debug-info=build/symbols --split-per-abi"
            apk_path: "build/app/outputs/flutter-apk/app-arm64-v8a-amazon-release.apk"
            artifact_name: icd360sev-amazon-apk
          - flavor: huawei
            build_cmd: "flutter build apk --release --flavor huawei --obfuscate --split-debug-info=build/symbols --split-per-abi"
            apk_path: "build/app/outputs/flutter-apk/app-arm64-v8a-huawei-release.apk"
            artifact_name: icd360sev-huawei-apk
          - flavor: samsung
            build_cmd: "flutter build apk --release --flavor samsung --obfuscate --split-debug-info=build/symbols --split-per-abi"
            apk_path: "build/app/outputs/flutter-apk/app-arm64-v8a-samsung-release.apk"
            artifact_name: icd360sev-samsung-apk
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > android/app/release-keystore.jks

      - name: Build APK (${{ matrix.flavor }})
        run: ${{ matrix.build_cmd }}
        env:
          KEYSTORE_PATH: release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.apk_path }}
          if-no-files-found: error

      - name: Upload debug symbols
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: symbols-android-${{ matrix.flavor }}
          path: build/symbols/

  # Save Android cache marker (runs after all matrix jobs)
  save-android-cache:
    name: Save Android Cache
    needs: [detect-changes, build-android]
    runs-on: ubuntu-latest
    steps:
      - run: echo "ok" > /tmp/android-ok.txt
      - uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: /tmp/android-ok.txt
          key: v3-build-ok-android-${{ needs.detect-changes.outputs.android_hash }}

  # ============================================
  # APPLE (iOS + macOS) - 1 runner
  # ============================================
  build-apple:
    name: Apple (iOS + macOS)
    needs: detect-changes
    if: needs.detect-changes.outputs.apple == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      # --- iOS Build ---
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS .app
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: icd360sev-ios
          path: build/ios/iphoneos/Runner.app
          if-no-files-found: error

      # --- macOS Build ---
      - name: Disable macOS code signing for CI
        run: |
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = "-"/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "Mac Development"/CODE_SIGN_IDENTITY = "-"/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "Sign to Run Locally"/CODE_SIGN_IDENTITY = "-"/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = B42ZX94AKL/DEVELOPMENT_TEAM = ""/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_ENTITLEMENTS = .*$/CODE_SIGN_ENTITLEMENTS = "";/g' macos/Runner.xcodeproj/project.pbxproj

      - name: Build macOS
        run: flutter build macos --release

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/icd360sev_mitglied.app"
          # Remove quarantine attributes so users don't get "damaged app" warning
          xattr -cr "$APP_PATH"
          DMG_DIR="build/dmg"
          mkdir -p "$DMG_DIR"
          cp -r "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "ICD360S Mitglieder" -srcfolder "$DMG_DIR" \
            -ov -format UDZO "build/icd360sev-mitglied.dmg"

      - name: Upload macOS .dmg
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: icd360sev-macos
          path: build/icd360sev-mitglied.dmg
          if-no-files-found: error

      - name: Save cache marker
        run: echo "ok" > /tmp/apple-ok.txt
      - uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: /tmp/apple-ok.txt
          key: v3-build-ok-apple-${{ needs.detect-changes.outputs.apple_hash }}

  # ============================================
  # WINDOWS - 1 runner
  # ============================================
  build-windows:
    name: Windows
    needs: detect-changes
    if: needs.detect-changes.outputs.windows == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build Windows
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion="${{ steps.version.outputs.version }}" windows\installer.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: icd360sev-windows
          path: icd360sev_setup.exe
          if-no-files-found: error

      - name: Save cache marker
        shell: bash
        run: echo "ok" > "$RUNNER_TEMP/win-ok.txt"
      - uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ runner.temp }}/win-ok.txt
          key: v3-build-ok-windows-${{ needs.detect-changes.outputs.win_hash }}

  # ============================================
  # Release (only on version tags)
  # ============================================
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-android, save-android-cache, build-apple, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release/

          # Android APKs + AAB
          cp artifacts/icd360sev-universal-apk/* release/icd360sev-universal.apk
          cp artifacts/icd360sev-fdroid-apk/*.apk release/icd360sev-fdroid.apk
          cp artifacts/icd360sev-googleplay-apk/*.apk release/icd360sev-googleplay.apk
          cp artifacts/icd360sev-googleplay-aab/* release/icd360sev-googleplay.aab
          cp artifacts/icd360sev-amazon-apk/*.apk release/icd360sev-amazon.apk
          cp artifacts/icd360sev-huawei-apk/*.apk release/icd360sev-huawei.apk
          cp artifacts/icd360sev-samsung-apk/*.apk release/icd360sev-samsung.apk

          # Windows installer
          cp artifacts/icd360sev-windows/icd360sev_setup.exe release/icd360sev_setup.exe

          # macOS DMG
          cp artifacts/icd360sev-macos/icd360sev-mitglied.dmg release/icd360sev-mitglied.dmg

          # iOS .app (zip for download)
          cd artifacts/icd360sev-ios && zip -r ../../release/icd360sev-ios.app.zip . && cd ../..

          # Linux raw bundle
          cd artifacts/icd360sev-linux && tar czf ../../release/icd360sev-linux.tar.gz . && cd ../..

          # Linux packages
          cp artifacts/icd360sev-linux-deb/*.deb release/icd360sev-mitglied.deb
          cp artifacts/icd360sev-linux-rpm/*.rpm release/icd360sev-mitglied.rpm
          cp artifacts/icd360sev-linux-appimage/*.AppImage release/icd360sev-mitglied.AppImage

          echo "Release files:"
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          generate_release_notes: true
          files: release/*

  # ============================================
  # DEPLOY to server (only on version tags)
  # ============================================
  deploy:
    name: Deploy to Server
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: artifacts/

      - name: Prepare deploy files
        run: |
          mkdir -p deploy/android deploy/linux deploy/windows deploy/macos deploy/ios

          # Android
          cp artifacts/icd360sev-fdroid-apk/*.apk deploy/android/icd360sev.apk
          cp artifacts/icd360sev-universal-apk/* deploy/android/icd360sev-universal.apk
          cp artifacts/icd360sev-googleplay-apk/*.apk deploy/android/icd360sev-googleplay.apk
          cp artifacts/icd360sev-googleplay-aab/* deploy/android/icd360sev-googleplay.aab
          cp artifacts/icd360sev-amazon-apk/*.apk deploy/android/icd360sev-amazon.apk
          cp artifacts/icd360sev-huawei-apk/*.apk deploy/android/icd360sev-huawei.apk
          cp artifacts/icd360sev-samsung-apk/*.apk deploy/android/icd360sev-samsung.apk

          # Linux
          cp artifacts/icd360sev-linux-deb/*.deb deploy/linux/icd360sev-mitglied.deb
          cp artifacts/icd360sev-linux-rpm/*.rpm deploy/linux/icd360sev-mitglied.rpm
          cp artifacts/icd360sev-linux-appimage/*.AppImage deploy/linux/icd360sev-mitglied.AppImage
          cd artifacts/icd360sev-linux && tar czf ../../deploy/linux/icd360sev-linux.tar.gz . && cd ../..

          # Windows (.exe installer)
          cp artifacts/icd360sev-windows/icd360sev_setup.exe deploy/windows/icd360sev_setup.exe

          # macOS (.dmg)
          cp artifacts/icd360sev-macos/icd360sev-mitglied.dmg deploy/macos/icd360sev-mitglied.dmg

          # iOS (.app)
          cd artifacts/icd360sev-ios && zip -r ../../deploy/ios/icd360sev-ios.app.zip . && cd ../..

          echo "Deploy files ready:"
          find deploy/ -type f -exec ls -lh {} \;

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Backup current versions on server
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          BASE="/var/www/icd360sev.icd360s.de/downloads/mitglieder"

          # Backup Android (each flavor)
          for flavor in fdroid googleplay amazon huawei samsung universal; do
            $SSH_CMD "[ -f $BASE/android/$flavor/icd360sev.apk ] && cp $BASE/android/$flavor/icd360sev.apk $BASE/android/$flavor/icd360sev_stable.apk || true"
          done
          $SSH_CMD "[ -f $BASE/android/googleplay/icd360sev.aab ] && cp $BASE/android/googleplay/icd360sev.aab $BASE/android/googleplay/icd360sev_stable.aab || true"

          # Backup other platforms
          $SSH_CMD "[ -f $BASE/windows/icd360sev_setup.exe ] && cp $BASE/windows/icd360sev_setup.exe $BASE/windows/icd360sev_setup_stable.exe || true"
          $SSH_CMD "[ -f $BASE/macos/icd360sev-mitglied.dmg ] && cp $BASE/macos/icd360sev-mitglied.dmg $BASE/macos/icd360sev-mitglied_stable.dmg || true"
          $SSH_CMD "[ -f $BASE/linux/icd360sev-mitglied.AppImage ] && cp $BASE/linux/icd360sev-mitglied.AppImage $BASE/linux/icd360sev-mitglied_stable.AppImage || true"

          echo "Backups created"

      - name: Upload to server
        run: |
          SCP_CMD="scp -i ~/.ssh/deploy_key -P ${{ secrets.SSH_PORT }}"
          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          BASE="/var/www/icd360sev.icd360s.de/downloads/mitglieder"

          # Create directories on server
          $SSH_CMD "mkdir -p \
            $BASE/android/fdroid \
            $BASE/android/googleplay \
            $BASE/android/amazon \
            $BASE/android/huawei \
            $BASE/android/samsung \
            $BASE/android/universal \
            $BASE/linux \
            $BASE/windows \
            $BASE/macos \
            $BASE/ios"

          DEST="${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"

          # Upload Android (each flavor in its own folder)
          $SCP_CMD deploy/android/icd360sev.apk $DEST:$BASE/android/fdroid/icd360sev.apk
          $SCP_CMD deploy/android/icd360sev-universal.apk $DEST:$BASE/android/universal/icd360sev.apk
          $SCP_CMD deploy/android/icd360sev-googleplay.apk $DEST:$BASE/android/googleplay/icd360sev.apk
          $SCP_CMD deploy/android/icd360sev-googleplay.aab $DEST:$BASE/android/googleplay/icd360sev.aab
          $SCP_CMD deploy/android/icd360sev-amazon.apk $DEST:$BASE/android/amazon/icd360sev.apk
          $SCP_CMD deploy/android/icd360sev-huawei.apk $DEST:$BASE/android/huawei/icd360sev.apk
          $SCP_CMD deploy/android/icd360sev-samsung.apk $DEST:$BASE/android/samsung/icd360sev.apk

          echo "✅ Android uploaded (7 flavors)"

          # Upload Linux
          $SCP_CMD deploy/linux/icd360sev-mitglied.deb $DEST:$BASE/linux/
          $SCP_CMD deploy/linux/icd360sev-mitglied.rpm $DEST:$BASE/linux/
          $SCP_CMD deploy/linux/icd360sev-mitglied.AppImage $DEST:$BASE/linux/
          $SCP_CMD deploy/linux/icd360sev-linux.tar.gz $DEST:$BASE/linux/
          echo "✅ Linux uploaded (.deb, .rpm, .AppImage, .tar.gz)"

          # Upload Windows (.exe installer)
          $SCP_CMD deploy/windows/icd360sev_setup.exe $DEST:$BASE/windows/icd360sev_setup.exe
          echo "✅ Windows uploaded (.exe)"

          # Upload macOS (.dmg)
          $SCP_CMD deploy/macos/icd360sev-mitglied.dmg $DEST:$BASE/macos/icd360sev-mitglied.dmg
          echo "✅ macOS uploaded (.dmg)"

          # Upload iOS (.app.zip)
          $SCP_CMD deploy/ios/icd360sev-ios.app.zip $DEST:$BASE/ios/icd360sev-ios.app.zip
          echo "✅ iOS uploaded (.app)"

      - name: Update F-Droid repository
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"

          # Copy signed fdroid APK into the F-Droid repo directory.
          # The systemd path unit fdroid-update.path on the server watches
          # this file and triggers fdroid-update.service (runs `fdroid update -c`)
          # automatically on PathChanged, with a 3s debounce.
          $SSH_CMD "cp /var/www/icd360sev.icd360s.de/downloads/mitglieder/android/fdroid/icd360sev.apk \
                       /var/www/icd360sev.icd360s.de/fdroid/repo/icd360sev.apk"

          # Wait for the index regeneration to finish. `systemctl start --wait`
          # on a oneshot unit blocks until ExecStart returns and propagates its
          # exit status — a failed index build will fail this CI step.
          $SSH_CMD "systemctl start --wait fdroid-update.service"

          echo "✅ F-Droid APK deployed + index regenerated"

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key
