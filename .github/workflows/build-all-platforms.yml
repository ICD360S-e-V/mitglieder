name: Build All Platforms

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.4'
  JAVA_VERSION: '17'

jobs:
  # ============================================
  # ANDROID - 5 App Store Flavors
  # ============================================
  build-android:
    name: Android (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: fdroid
            artifact_name: icd360sev-fdroid
          - flavor: googleplay
            artifact_name: icd360sev-googleplay
          - flavor: amazon
            artifact_name: icd360sev-amazon
          - flavor: huawei
            artifact_name: icd360sev-huawei
          - flavor: samsung
            artifact_name: icd360sev-samsung

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      # Build APK (split-per-abi for smaller size)
      - name: Build APK (${{ matrix.flavor }})
        run: |
          flutter build apk --release --flavor ${{ matrix.flavor }} \
            --obfuscate --split-debug-info=build/symbols --split-per-abi

      # Build AAB for Google Play (Google handles ABI splitting)
      - name: Build AAB (Google Play)
        if: matrix.flavor == 'googleplay'
        run: |
          flutter build appbundle --release --flavor googleplay \
            --obfuscate --split-debug-info=build/symbols-aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-apk
          path: build/app/outputs/flutter-apk/app-${{ matrix.flavor }}-arm64-v8a-release.apk
          if-no-files-found: error

      - name: Upload AAB (Google Play)
        if: matrix.flavor == 'googleplay'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-aab
          path: build/app/outputs/bundle/googleplayRelease/app-googleplay-release.aab
          if-no-files-found: error

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: symbols-android-${{ matrix.flavor }}
          path: build/symbols/

  # ============================================
  # iOS
  # ============================================
  build-ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: icd360sev-ios
          path: build/ios/iphoneos/Runner.app
          if-no-files-found: error

  # ============================================
  # macOS
  # ============================================
  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build macOS
        run: flutter build macos --release

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: icd360sev-macos
          path: build/macos/Build/Products/Release/icd360sev_mitglied.app
          if-no-files-found: error

  # ============================================
  # Windows
  # ============================================
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: icd360sev-windows
          path: build/windows/x64/runner/Release/
          if-no-files-found: error

  # ============================================
  # Linux
  # ============================================
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev libnotify-dev \
            libayatana-appindicator3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: icd360sev-linux
          path: build/linux/x64/release/bundle/
          if-no-files-found: error

  # ============================================
  # Release (only on version tags)
  # ============================================
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-ios, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release/

          # Android APKs + AAB
          cp artifacts/icd360sev-fdroid-apk/*.apk release/icd360sev-fdroid.apk
          cp artifacts/icd360sev-googleplay-apk/*.apk release/icd360sev-googleplay.apk
          cp artifacts/icd360sev-googleplay-aab/*.aab release/icd360sev-googleplay.aab
          cp artifacts/icd360sev-amazon-apk/*.apk release/icd360sev-amazon.apk
          cp artifacts/icd360sev-huawei-apk/*.apk release/icd360sev-huawei.apk
          cp artifacts/icd360sev-samsung-apk/*.apk release/icd360sev-samsung.apk

          # Desktop & iOS - zip/tar bundles
          cd artifacts/icd360sev-windows && zip -r ../../release/icd360sev-windows.zip . && cd ../..
          cd artifacts/icd360sev-linux && tar czf ../../release/icd360sev-linux.tar.gz . && cd ../..
          cd artifacts/icd360sev-macos && zip -r ../../release/icd360sev-macos.zip . && cd ../..
          cd artifacts/icd360sev-ios && zip -r ../../release/icd360sev-ios.zip . && cd ../..

          # Debug symbols archive
          mkdir -p symbols-all/
          for dir in artifacts/symbols-android-*; do
            flavor=$(basename "$dir" | sed 's/symbols-android-//')
            cp -r "$dir" "symbols-all/$flavor"
          done
          cd symbols-all && zip -r ../release/debug-symbols.zip . && cd ..

          echo "Release files:"
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
